<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arca Hotel — Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<aside id="sidebarContainer" class="sidebar"></aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Booking Management</div>
      <div class="topbar-sub">Kelola data pemesanan kamar hotel Arca</div>
    </div>
    <button class="btn-add" onclick="openCreateModal()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah Booking
    </button>
  </div>

  <div class="content">
    <div class="stats" id="statsContainer"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Daftar Booking</div>
        <div class="search-box">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cari customer..." oninput="filterTable()"/>
        </div>
      </div>
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td><div class="empty-state"><div class="spinner-dark"></div><p>Memuat data...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast">
  <svg id="toastIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"></svg>
  <span id="toastMsg"></span>
</div>

<script src="/static/app.js"></script>
<script>
  function statusBadge(status) {
    status = status || 'pending';
    var cls = status === 'paid' ? 'badge-paid' : status === 'cancelled' ? 'badge-cancelled' : 'badge-pending';
    return '<span class="badge ' + cls + '">&#9679; ' + status + '</span>';
  }

  var ENTITY = {
    name: 'bookings',
    displayName: 'Booking',
    idField: 'id_booking',
    fields: [
      { label: 'Customer', key: 'id_customer', type: 'select', resource: 'customers', labelField: 'name', valueField: 'id_customer', required: true },
      { label: 'Room', key: 'id_room', type: 'select', resource: 'rooms', labelField: 'room_number', valueField: 'id_room', required: true },
      { label: 'Check-in', key: 'date_in', type: 'datetime-local', required: true },
      { label: 'Check-out', key: 'date_out', type: 'datetime-local', required: true },
      { label: 'Total Pembayaran', key: 'total_payment', type: 'number', required: true, min: '0', step: '1000' },
      { label: 'Status Pembayaran', key: 'status_payment', type: 'select', options: [
        { value: 'pending', label: 'Pending' },
        { value: 'paid', label: 'Paid' },
        { value: 'cancelled', label: 'Cancelled' },
      ]},
    ],
    columns: [
      { label: 'Customer #', key: 'id_customer', render: function(r) { return '<span style="font-family:monospace;font-size:12px;color:var(--text-muted);">#' + r.id_customer + '</span>'; } },
      { label: 'Room #', key: 'id_room', render: function(r) { return '<span style="font-family:monospace;font-size:12px;color:var(--text-muted);">#' + r.id_room + '</span>'; } },
      { label: 'Check-in', key: 'date_in', render: function(r) { return App.formatDate(r.date_in); } },
      { label: 'Check-out', key: 'date_out', render: function(r) { return App.formatDate(r.date_out); } },
      { label: 'Total', key: 'total_payment', render: function(r) { return App.formatRupiah(r.total_payment); } },
      { label: 'Status', key: 'status_payment', render: function(r) { return statusBadge(r.status_payment); } },
    ],
    stats: [
      { id: 'total', label: 'Total Booking', icon: 'booking', compute: function(all) { return all.length; } },
      { id: 'revenue', label: 'Total Revenue', icon: 'revenue', compute: function(all) { return App.formatRupiah(all.reduce(function(s, r) { return s + (r.total_payment || 0); }, 0)); } },
      { id: 'shown', label: 'Tampil Saat Ini', icon: 'eye', compute: function(all, filt) { return filt.length; } },
    ],
    onEdit: true,
    onDelete: true,
  };

  App.initPage(ENTITY);
</script>
</body>
</html>
