<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-white shadow">
<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">

<h1 class="text-xl font-bold text-blue-600">
Dashboard
</h1>

<a href="/"
class="text-red-500 font-medium hover:underline">
Logout
</a>

</div>
</nav>

<!-- Content -->
<div class="max-w-6xl mx-auto mt-10 px-6">

<h2 class="text-3xl font-bold mb-6">
Welcome to your dashboard 🎉
</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-lg font-semibold mb-2">Customer List</h3>
<p class="text-gray-600 mb-4">
View and manage your customer list.
</p>
<a href="/customer"
class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
View
</a>
</div>

<!-- Card 1 -->
<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-lg font-semibold mb-2">My Bookings</h3>
<p class="text-gray-600 mb-4">
View and manage your hotel bookings.
</p>
<a href="/mybooking"
class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
View
</a>
</div>

<!-- Card 2 -->
<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-lg font-semibold mb-2">Available Rooms</h3>
<p class="text-gray-600 mb-4">
Explore available hotel rooms.
</p>
<button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
Browse
</button>
</div>

<!-- Card 3 -->
<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-lg font-semibold mb-2">Profile</h3>
<p class="text-gray-600 mb-4">
Update your account information.
</p>
<button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
Edit
</button>
</div>

</div>
<div class="mt-10 bg-white p-6 rounded-xl shadow">

  <h3 class="text-xl font-bold mb-4">
  AI Room Recommendation
  </h3>
  
  <input
  id="message"
  class="border w-full p-2 rounded mb-2"
  placeholder="Describe what kind of room you want">
  
  <button
  onclick="sendMessage()"
  class="bg-blue-500 text-white px-4 py-2 rounded">
  Ask AI
  </button>
  
  <p id="reply" class="mt-4 text-gray-700"></p>
  
  </div>
</div>

</body>
</html>

<script>

  async function sendMessage(){
  
  const message = document.getElementById("message").value
  
  const response = await fetch("/ai-recommend",{
  method:"POST",
  headers:{
  "Content-Type":"application/json"
  },
  body: JSON.stringify({
  message: message
  })
  })
  
  const data = await response.json()
  
  document.getElementById("reply").innerText = data.reply
  
  }
  
  </script>
