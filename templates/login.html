<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arca Hotel — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <h1>ARCA</h1>
      <p class="login-sub">Hotel Management System</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm" onsubmit="return false">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="email" placeholder="admin@arca.com" required autofocus/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Masukkan password" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select" id="role" required>
            <option value="">-- Pilih Role --</option>
            <option value="customer">Customer</option>
            <option value="owner">Owner</option>
            <option value="staff">Staff</option>
          </select>
        </div>
        <button class="btn-submit" type="submit" id="submitBtn" onclick="doLogin()">
          Masuk
        </button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <svg id="toastIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"></svg>
    <span id="toastMsg"></span>
  </div>

  <script src="/static/app.js"></script>
  <script>
    // Redirect if already logged in
    if (App.getToken()) window.location.href = '/dashboard';

    // Handle Enter key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      var errEl = document.getElementById('loginError');
      var btn = document.getElementById('submitBtn');

      errEl.style.display = 'none';

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var role = document.getElementById('role').value;

      if (!email || !password || !role) {
        errEl.textContent = 'Mohon lengkapi semua field.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Masuk...';

      try {
        var r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password, role: role })
        });

        var data = await r.json();

        if (!r.ok) {
          throw new Error(data.error || 'Login gagal');
        }

        App.setToken(data.token);
        App.setUser(data.user);
        window.location.href = '/dashboard';

      } catch (err) {
        errEl.textContent = err.message || 'Gagal terhubung ke server.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Masuk';
      }
    }
  </script>
</body>
</html>
