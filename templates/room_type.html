<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arca Hotel — Room Type</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<aside id="sidebarContainer" class="sidebar"></aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Room Type Management</div>
      <div class="topbar-sub">Kelola tipe dan harga kamar hotel Arca</div>
    </div>
    <button class="btn-add" onclick="openCreateModal()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah Room Type
    </button>
  </div>

  <div class="content">
    <div class="stats" id="statsContainer"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Daftar Room Type</div>
        <div class="search-box">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cari nama..." oninput="filterTable()"/>
        </div>
      </div>
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td><div class="empty-state"><div class="spinner-dark"></div><p>Memuat data...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast">
  <svg id="toastIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"></svg>
  <span id="toastMsg"></span>
</div>

<script src="/static/app.js"></script>
<script>
  var ENTITY = {
    name: 'room-types',
    displayName: 'Room Type',
    idField: 'id_room_type',
    fields: [
      { label: 'Nama Tipe', key: 'name', type: 'text', required: true },
      { label: 'Harga / Malam', key: 'price', type: 'number', required: true, min: '0', step: '1000' },
      { label: 'Deskripsi', key: 'description', type: 'textarea' },
    ],
    columns: [
      {
        label: 'Nama', key: 'name',
        render: function(r) { return '<span class="customer-name">' + r.name + '</span>'; }
      },
      { label: 'Harga', key: 'price', render: function(r) { return App.formatRupiah(r.price); } },
      {
        label: 'Deskripsi', key: 'description',
        render: function(r) { return '<span style="font-size:12.5px;color:var(--text-muted)">' + (r.description || '—') + '</span>'; }
      },
      { label: 'ID', key: 'id_room_type', render: function(r) { return '<span style="font-family:monospace;font-size:12px;color:var(--text-muted)">#' + r.id_room_type + '</span>'; } },
    ],
    stats: [
      { id: 'total', label: 'Total Tipe', icon: 'total', compute: function(all) { return all.length; } },
      { id: 'shown', label: 'Tampil Saat Ini', icon: 'eye', compute: function(all, filt) { return filt.length; } },
    ],
    onEdit: true,
    onDelete: true,
  };

  App.initPage(ENTITY);
</script>
</body>
</html>
