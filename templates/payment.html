<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arca Hotel — Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<aside id="sidebarContainer" class="sidebar"></aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Payment Management</div>
      <div class="topbar-sub">Kelola data pembayaran hotel Arca</div>
    </div>
    <button class="btn-add" onclick="openCreateModal()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah Payment
    </button>
  </div>

  <div class="content">
    <div class="stats" id="statsContainer"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Daftar Payment</div>
        <div class="search-box">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cari metode..." oninput="filterTable()"/>
        </div>
      </div>
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td><div class="empty-state"><div class="spinner-dark"></div><p>Memuat data...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast">
  <svg id="toastIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"></svg>
  <span id="toastMsg"></span>
</div>

<script src="/static/app.js"></script>
<script>
  function statusBadge(status) {
    status = status || 'pending';
    var cls = status === 'paid' ? 'badge-paid' : status === 'cancelled' ? 'badge-cancelled' : 'badge-pending';
    return '<span class="badge ' + cls + '">&#9679; ' + status + '</span>';
  }

  var ENTITY = {
    name: 'payments',
    displayName: 'Payment',
    idField: 'id_payment',
    fields: [
      { label: 'Booking', key: 'id_booking', type: 'select', resource: 'bookings', labelField: 'id_booking', valueField: 'id_booking', required: true },
      { label: 'Jumlah', key: 'total_payment', type: 'number', required: true, min: '0', step: '1000' },
      { label: 'Metode', key: 'method', type: 'text', required: true, placeholder: 'transfer, cash, credit_card' },
      { label: 'Tanggal', key: 'date', type: 'datetime-local', required: true },
      { label: 'Status', key: 'status', type: 'select', options: [
        { value: 'pending', label: 'Pending' },
        { value: 'paid', label: 'Paid' },
        { value: 'cancelled', label: 'Cancelled' },
      ]},
    ],
    columns: [
      { label: 'Booking #', key: 'id_booking', render: function(r) { return '<span style="font-family:monospace;font-size:12px;color:var(--text-muted);">#' + r.id_booking + '</span>'; } },
      { label: 'Jumlah', key: 'total_payment', render: function(r) { return App.formatRupiah(r.total_payment); } },
      { label: 'Metode', key: 'method', render: function(r) { return '<span class="badge badge-active">' + r.method + '</span>'; } },
      { label: 'Tanggal', key: 'date', render: function(r) { return App.formatDate(r.date); } },
      { label: 'Status', key: 'status', render: function(r) { return statusBadge(r.status); } },
    ],
    stats: [
      { id: 'total', label: 'Total Payment', icon: 'revenue', compute: function(all) { return all.length; } },
      { id: 'revenue', label: 'Total Dibayar', icon: 'revenue', compute: function(all) { return App.formatRupiah(all.filter(function(p) { return p.status === 'paid'; }).reduce(function(s, p) { return s + (p.total_payment || 0); }, 0)); } },
      { id: 'shown', label: 'Tampil Saat Ini', icon: 'eye', compute: function(all, filt) { return filt.length; } },
    ],
    onEdit: true,
    onDelete: true,
  };

  App.initPage(ENTITY);
</script>
</body>
</html>
