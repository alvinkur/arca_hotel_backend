<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arca Hotel - Room Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-xl flex flex-col">
        <div class="p-6 border-b border-gray-100">
            <h2 class="text-2xl font-bold text-blue-600 tracking-tight">Arca Hotel</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors">Dashboard</a>
            <a href="#" class="block p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors">Owner</a>
            <a href="#" class="block p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors">Customer</a>
            <a href="#" class="block p-3 bg-blue-50 text-blue-600 font-medium rounded-lg">Room</a>
            <a href="#" class="block p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors">Booking</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Room Management</h1>
                <p class="text-gray-500 mt-1">Kelola data kamar hotel, harga, dan ketersediaan.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-semibold mb-5 text-gray-800">Tambah Kamar</h2>
                    
                    <form id="roomForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipe Kamar</label>
                            <input type="text" id="type" placeholder="Contoh: Deluxe, Suite..." required
                                class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
                            <input type="number" id="price" placeholder="Contoh: 500000" required
                                class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ketersediaan</label>
                            <select id="availability" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                <option value="true">Tersedia</option>
                                <option value="false">Penuh / Maintenance</option>
                            </select>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 text-white font-medium p-3 rounded-xl hover:bg-blue-700 transition-colors mt-2">
                            Simpan Data
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-semibold mb-5 text-gray-800">Daftar Kamar</h2>
                    <div id="roomList" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8080/rooms';

        // 1. FUNGSI FORMAT RUPIAH
        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        // 2. GET DATA (TAMPILKAN LIST)
        function loadRooms() {
            fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                let container = document.getElementById('roomList');
                container.innerHTML = "";

                if(data.length === 0) {
                    container.innerHTML = `<p class="text-gray-500 col-span-2 text-center py-8">Belum ada data kamar.</p>`;
                    return;
                }

                data.forEach(room => {
                    // Badge status
                    let statusBadge = room.availability 
                        ? `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-medium">Tersedia</span>`
                        : `<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full font-medium">Penuh</span>`;

                    let card = document.createElement('div');
                    card.className = "p-5 border border-gray-100 rounded-xl hover:shadow-md transition-shadow relative overflow-hidden";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-sm text-gray-500 mb-1">ID: ${room.id_room}</p>
                                <h3 class="font-bold text-lg text-gray-800">${room.type}</h3>
                            </div>
                            ${statusBadge}
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-50">
                            <p class="text-blue-600 font-bold">${formatRupiah(room.price)} <span class="text-sm text-gray-400 font-normal">/ malam</span></p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => console.error("Gagal mengambil data:", err));
        }

        // 3. POST DATA (TAMBAH KAMAR BARU)
        document.getElementById('roomForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Mengambil nilai dan konversi tipe data yang sesuai dengan struct Go
            const payload = {
                type: document.getElementById('type').value,
                price: parseFloat(document.getElementById('price').value),
                availability: document.getElementById('availability').value === 'true'
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if(!res.ok) throw new Error("Gagal menyimpan data");
                return res.json();
            })
            .then(() => {
                document.getElementById('roomForm').reset();
                loadRooms(); // Refresh list otomatis
            })
            .catch(err => alert(err.message));
        });

        // Load data saat halaman pertama kali dibuka
        loadRooms();
    </script>

</body>
</html>
