<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arca Hotel — Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<aside id="sidebarContainer" class="sidebar"></aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Room Management</div>
      <div class="topbar-sub">Kelola nomor dan ketersediaan kamar hotel Arca</div>
    </div>
    <button class="btn-add" onclick="openCreateModal()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah Room
    </button>
  </div>

  <div class="content">
    <div class="stats" id="statsContainer"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Daftar Room</div>
        <div class="search-box">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cari nomor kamar..." oninput="filterTable()"/>
        </div>
      </div>
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td><div class="empty-state"><div class="spinner-dark"></div><p>Memuat data...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast">
  <svg id="toastIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"></svg>
  <span id="toastMsg"></span>
</div>

<script src="/static/app.js"></script>
<script>
  var ENTITY = {
    name: 'rooms',
    displayName: 'Room',
    idField: 'id_room',
    fields: [
      { label: 'Nomor Kamar', key: 'room_number', type: 'text', required: true },
      { label: 'Tipe Kamar', key: 'id_room_type', type: 'select', resource: 'room-types', labelField: 'name', valueField: 'id_room_type', required: true },
      { label: 'Ketersediaan', key: 'availability', type: 'toggle', toggleLabel: 'Tersedia' },
    ],
    columns: [
      {
        label: 'Kamar', key: 'room_number',
        render: function(r) {
          var rt = r.room_type;
          return '<div><div class="customer-name">#' + r.room_number + '</div><div style="font-size:12px;color:var(--text-muted);">' + (rt ? rt.name : '—') + '</div></div>';
        }
      },
      {
        label: 'Tipe', key: 'id_room_type',
        render: function(r) { return r.room_type ? r.room_type.name : '—'; }
      },
      {
        label: 'Harga', key: 'room_type',
        render: function(r) { return r.room_type ? App.formatRupiah(r.room_type.price) + '<span style="font-size:11px;color:var(--text-muted);">/malam</span>' : '—'; }
      },
      {
        label: 'Status', key: 'availability',
        render: function(r) {
          return r.availability
            ? '<span class="badge badge-active">&#9679; Tersedia</span>'
            : '<span class="badge badge-unavailable">&#9679; Penuh</span>';
        }
      },
    ],
    stats: [
      { id: 'total', label: 'Total Room', icon: 'total', compute: function(all) { return all.length; } },
      { id: 'available', label: 'Tersedia', icon: 'eye', compute: function(all) { return all.filter(function(r) { return r.availability; }).length; } },
      { id: 'shown', label: 'Tampil Saat Ini', icon: 'eye', compute: function(all, filt) { return filt.length; } },
    ],
    onEdit: true,
    onDelete: true,
  };

  App.initPage(ENTITY);
</script>
</body>
</html>
