<!DOCTYPE html>
<html>
<head>
    <title>Arca Hotel - Owner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen flex items-center justify-center">

<div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl p-8">

    <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">
        Owner Management
    </h1>

    <!-- LIST -->
    <div class="mb-8">
        <h2 class="text-xl font-semibold mb-3">Owner List</h2>
        <div id="ownerList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- FORM -->
    <div>
        <h2 class="text-xl font-semibold mb-3">Tambah Owner</h2>

        <form id="form" class="grid grid-cols-2 gap-4">
            <input class="p-3 border rounded-lg col-span-1" type="text" id="name" placeholder="Name" required>
            <input class="p-3 border rounded-lg col-span-1" type="email" id="email" placeholder="Email" required>
            <input class="p-3 border rounded-lg col-span-1" type="text" id="password" placeholder="Password" required>

            <button class="col-span-2 bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600">
                Tambah Owner
            </button>
        </form>
    </div>

</div>

<script>

// 🔥 GET DATA
function loadOwners() {
    fetch('/owners')
    .then(res => res.json())
    .then(data => {
        console.log(data) // debug

        let container = document.getElementById('ownerList')
        container.innerHTML = ""

        data.forEach(o => {
            let card = document.createElement('div')
            card.className = "p-4 bg-gray-50 rounded-xl shadow"

            card.innerHTML = `
                <h3 class="font-bold text-lg">${o.name}</h3>
                <p class="text-gray-500">${o.email}</p>
            `

            container.appendChild(card)
        })
    })
    .catch(err => console.log("ERROR:", err))
}

// 🔥 POST DATA
document.getElementById('form').addEventListener('submit', function(e) {
    e.preventDefault()

    fetch('/owners', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        })
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById('form').reset()
        loadOwners()
    })
})

// load awal
loadOwners()

</script>

</body>
</html>
